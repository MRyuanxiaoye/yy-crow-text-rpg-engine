    playstyle_tags: ["权谋政斗", "行政改革", "派系经营", "财政调度"]
    difficulty: "normal"
    teaser_goal: "让内阁从替罪羊变成真正的危机调度中枢。"
    branch_hints: ["科举改革线", "结党线", "清丈财政线", "权臣线"]
  - role_id: "rebel_leader"
    name: "起义领袖"
    source_npc_id: "li_zicheng"
    perspective: "民间"
    core_play: "聚众起兵、争粮争地，在民心、军纪和新秩序之间选择。"
    playstyle_tags: ["起义经营", "战争机动", "民心争夺", "建制称王"]
    difficulty: "normal"
    teaser_goal: "从求活之众变成能问鼎天下的新政权，或在招安与称王间选择另一条路。"
    branch_hints: ["称王线", "招安线", "分田免粮线", "入京建制线"]
  - role_id: "chief_eunuch"
    name: "大宦官"
