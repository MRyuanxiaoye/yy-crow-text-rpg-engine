validation_hints:
  minimum_meaningful_choices: 16
  npc_conflict_required: true
  pressure_has_counterplay: true

board_regions:
  jingshi:
    name: 京师
    category: geographic
    info_layers:
      - id: court
        label: 朝堂
        initial_known: "魏党余孽仍占要职，六部尚书多为旧臣观望。新君即位未满一年，朝中分为拥立派、中立派与潜伏魏党三股势力。"
        initial_fog:
          hint: "有传言朝中有人暗通外敌，但消息来源不可靠"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: personnel
        label: 人物
        initial_known: "温体仁（礼部侍郎·善揣圣意·立场不明）、王承恩（司礼监秉笔·忠心可用）、孙承宗（兵部尚书·老成持重·力主边防）"
        initial_fog:
          hint: "温体仁与魏党余脉是否有未断的联系？"
          unlock_condition:
            dimension: 情报
            threshold: 4
          unlock_text: null
      - id: finance
        label: 财务
        initial_known: "国库存银不足百万两，辽饷、赈灾、京营三项开支已无法同时满足。户部建议加派三饷，但民间已有怨言。"
        initial_fog:
          hint: "魏忠贤抄家所得银两去向不明"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: palace
        label: 宫禁
        initial_known: "司礼监运转正常，厂卫系统因魏忠贤倒台后士气低落但架构尚存。"
        initial_fog:
          hint: "宫中是否仍有魏忠贤埋下的暗桩？"
          unlock_condition:
            dimension: 情报
            threshold: 6
          unlock_text: null
      - id: intelligence
        label: 情报网
        initial_known: "锦衣卫指挥使骆养性可用，东厂眼线因清洗而残缺。京师内外消息传递依赖驿站和厂卫两条线。"
        initial_fog:
          hint: "厂卫内部有人在向外泄露宫中决策"
          unlock_condition:
            dimension: 情报
            threshold: 7
          unlock_text: null
      - id: public
        label: 民间
        initial_known: "京师物价尚稳，百姓对新君有期待。但坊间流言渐多，有关辽东败报和流贼四起的消息在茶馆传播。"
        initial_fog:
          hint: "有人在散布动摇人心的谣言，背后是谁？"
          unlock_condition:
            action: "派锦衣卫暗查京师舆情"
          unlock_text: null

  liaodong:
    name: 辽东
    category: geographic
    info_layers:
      - id: military
        label: 军情
        initial_known: "宁远守军约三万，欠饷四月，关宁铁骑战力尚存但士气低迷。山海关防线基本稳固。"
        initial_fog:
          hint: "后金近期兵力调动频繁，具体意图不明"
          unlock_condition:
            dimension: 情报
            threshold: 4
          unlock_text: "皇太极正在沈阳以北集结八旗精锐，规模约六万。情报显示他可能计划绕道蒙古突入长城。"
      - id: personnel
        label: 人物
        initial_known: "袁崇焕（辽东督师·能战善守·朝中有人弹劾其擅杀毛文龙）；吴三桂（山海关总兵·年轻骁勇·忠诚随饷银浮动）"
        initial_fog:
          hint: "边将之间暗中角力，各有盘算"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: economy
        label: 经济
        initial_known: "辽饷每年需银400万两以上，占朝廷岁入近半。宁远商市原可贴补军需，但战事一紧即断。"
        initial_fog:
          hint: "辽东商路上有大量货物流向后金方向"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: supply
        label: 补给
        initial_known: "粮草主要走山海关陆路，运力有限且常被马匪骚扰。海运通道理论上更快但未常设。"
        initial_fog:
          hint: "是否可以开辟天津至觉华岛的海运补给线？"
          unlock_condition:
            action: "召见知情者讨论海运可行性"
          unlock_text: null
      - id: terrain
        label: 地势
        initial_known: "宁锦防线依托城堡群和地利，正面强攻代价极大。但关外地形复杂，有多条绕行路线。"
        initial_fog:
          hint: "大安口、龙井关等长城薄弱段是否有人戍守？"
          unlock_condition:
            dimension: 情报
            threshold: 6
          unlock_text: null
      - id: undercurrent
        label: 暗线
        initial_known: null
        initial_fog:
          hint: "有密报称后金在实施反间计，目标可能是袁崇焕"
          unlock_condition:
            dimension: 情报
            threshold: 6
          unlock_text: null

  shanxi:
    name: 陕西
    category: geographic
    info_layers:
      - id: civil
        label: 民情
        initial_known: "连年旱灾，赤地千里。关中平原流民已逾十万，多聚于山谷荒地。官府赈济杯水车薪。"
        initial_fog:
          hint: "流民中是否已有人在暗中串联组织？"
          unlock_condition:
            dimension: 情报
            threshold: 4
          unlock_text: "流民尚无统一指挥，但有数股势力在争夺人心。一个叫高迎祥的前驿卒聚众最多，另有王嘉胤在府谷起事。"
      - id: officials
        label: 官员
        initial_known: "陕西巡抚衙门多次请旨赈济，均因国库空虚被搁置。地方州县官员有的尚在勉力维持，有的已弃城而走。"
        initial_fog:
          hint: "当地官员是否有人中饱私囊、截留赈灾银？"
          unlock_condition:
            action: "派人暗查陕西吏治"
          unlock_text: null
      - id: garrison
        label: 驻军
        initial_known: "陕西卫所兵空额严重，在册三万实际能调动不足万人。边军精锐已被调往辽东。"
        initial_fog:
          hint: "若流贼坐大，陕西驻军是否足以剿灭？"
          unlock_condition:
            dimension: 兵力
            threshold: 5
          unlock_text: null
      - id: relief
        label: 赈灾
        initial_known: "上月已批复赈灾银十万两，但尚未抵达。旱灾持续恶化，预计明年春荒更甚。"
        initial_fog:
          hint: "赈灾银走到哪一站了？沿途是否安全？"
          unlock_condition:
            action: "追查赈灾银运送进度"
          unlock_text: null
      - id: undercurrent
        label: 隐患
        initial_known: "有奏报称流民中开始流传'十八子当主天下'的谶语，指向李姓。"
        initial_fog:
          hint: "流民领袖背后是否有读书人在出谋划策？"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: geography
        label: 地势
        initial_known: "潼关扼守东西咽喉，函谷关控制入中原通道。陕北黄土沟壑利于游击，不利正规军围剿。"
        initial_fog:
          hint: "流贼若突破潼关，中原门户大开"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null

  jiangnan:
    name: 江南
    category: geographic
    info_layers:
      - id: overview
        label: 概况
        initial_known: "天下赋税半出江南。苏杭繁华，商贾云集。但朝廷对江南的直接掌控力随距离递减。"
        initial_fog:
          hint: "江南地方势力与朝廷的实际关系如何？"
          unlock_condition:
            action: "派人或召见相关官员了解江南实况"
          unlock_text: null
      - id: salt
        label: 盐商
        initial_known: "两淮盐税是朝廷重要收入来源。盐商富可敌国，与地方官员关系盘根错节。"
        initial_fog:
          hint: "盐商在朝中有哪些靠山？是否可以借力？"
          unlock_condition:
            dimension: 情报
            threshold: 5
          unlock_text: null
      - id: tax
        label: 税赋
        initial_known: "江南赋税占全国近三成，但年年拖欠。地方以灾报为由截留税银的情况越来越多。"
        initial_fog:
          hint: "实际税收与上报数字之间差距有多大？"
          unlock_condition:
            dimension: 财政
            threshold: 5
          unlock_text: null
      - id: literati
        label: 士林
        initial_known: "东林书院与复社影响力极大。江南士子掌握舆论，弹劾奏章多出其手。对魏党深恶痛绝，但也排斥异己。"
        initial_fog:
          hint: "东林中坚人物对新君持什么态度？是否可以为己所用？"
          unlock_condition:
            action: "召见江南籍官员或派人打探"
          unlock_text: null
      - id: transport
        label: 漕运
        initial_known: "大运河是南粮北运的命脉。漕运总督掌控南北物资流通，权势极大。近年漕船老化，运力下降。"
        initial_fog:
          hint: "漕运系统是否存在中饱私囊、以次充好的弊端？"
          unlock_condition:
            dimension: 情报
            threshold: 6
          unlock_text: null
      - id: coastal
        label: 海防
        initial_known: "东南沿海偶有海盗出没。福建郑芝龙据海为王，名义受招安但实际独立。"
        initial_fog:
          hint: "郑芝龙的海上势力实际控制范围有多大？能否纳为己用？"
          unlock_condition:
            dimension: 情报
            threshold: 7
          unlock_text: null
