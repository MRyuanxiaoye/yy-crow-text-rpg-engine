    severity: "critical"
    description: "京畿地区爆发大疫。"
    narrative_hint: "太医院急奏：'京城内外疫病蔓延，日死数百，军营亦有传染！'"
    involved_factions: ["ming_court", "frontier_army", "rebel_forces"]
    involved_npcs: []
    prerequisites: []
    default_effects:
      world_dimensions: { "兵力": -1, "民心": -1, "派系势力": 1 }
      information_added: ["I_plague_in_capital"]
      consequence_seed: { enabled: true, severity: "high", directions: ["京营疫弱", "城防恐慌", "救治资源争夺"] }
  - event_id: "E_li_zicheng_march"
    name: "闯军东进"
    at: { year: 17, month: 1 }
    severity: "critical"
    description: "李自成大军从西安出发，直指北京。"
    narrative_hint: "探马来报：'闯贼号称百万，已过潼关，沿途州县望风而降！'"
    involved_factions: ["rebel_forces", "ming_court", "frontier_army"]
    involved_npcs: ["li_zicheng"]
    prerequisites: []
    default_effects:
      world_dimensions: { "民心": -2, "派系势力": 2, "兵力": -1 }
      information_added: ["I_rebel_march_capital"]
      consequence_seed: { enabled: true, severity: "high", directions: ["京师围城", "吴三桂去向", "南迁争议"] }

condition_events:
  - event_id: "N_wenti_impeach"
    name: "温体仁弹劾政敌"
    severity: "moderate"
    trigger:
      all:
        - { dimension: "派系势力", operator: ">=", value: 6 }
        - { event_not_triggered: "N_wenti_impeach" }
    description: "温体仁联合言官弹劾周延儒。"
    narrative_hint: "温体仁持奏疏入殿：'陛下，臣有本参劾首辅周延儒十大罪状！'"
    recommended_responses: ["压下弹章", "公开廷议", "借案清洗"]
    default_effects:
      world_dimensions: { "派系势力": 1 }
      npc_relation_deltas: {}
  - event_id: "N_wusangui_request"
    name: "吴三桂请饷"
    severity: "moderate"
    trigger:
      all:
        - { dimension: "财政", operator: "<=", value: 3 }
        - { dimension: "兵力", operator: "<=", value: 4 }
        - { event_not_triggered: "N_wusangui_request" }
    description: "吴三桂上疏请求增拨军饷。"
    narrative_hint: "关宁总兵吴三桂急奏：'军中欠饷三月，将士怨声载道，恳请拨饷！'"
    recommended_responses: ["拨饷稳军", "派监军核饷", "以爵赏拖延"]
    default_effects:
      world_dimensions: { "兵力": -2 }
      npc_relation_deltas: {}
  - event_id: "N_li_zicheng_grow"
    name: "闯军壮大"
    severity: "moderate"
    trigger:
      all:
        - { dimension: "民心", operator: "<=", value: 3 }
        - { event_not_triggered: "N_li_zicheng_grow" }
    description: "李自成势力急剧膨胀。"
    narrative_hint: "兵部急报：'闯贼裹挟流民，兵力已逾十万，攻陷数城！'"
    recommended_responses: ["赈抚分化", "集中清剿", "招抚首领"]
    default_effects:
      world_dimensions: { "民心": -1, "兵力": -1 }
      npc_relation_deltas: {}
  - event_id: "N_wang_chengen_warn"
    name: "王承恩密报"
    severity: "minor"
    trigger:
      all:
        - { dimension: "派系势力", operator: ">=", value: 7 }
        - { event_not_triggered: "N_wang_chengen_warn" }
    description: "王承恩密报宫中异动。"
    narrative_hint: "王承恩深夜求见：'陛下，奴婢探得宫中有人暗通外臣，恐有不测……'"
    recommended_responses: ["秘查宫禁", "召内阁对质", "暂压不发"]
    default_effects:
      world_dimensions: { "派系势力": 1 }
      npc_relation_deltas: {}
  - event_id: "T_financial_crisis"
    name: "财政崩溃"
    severity: "critical"
    trigger:
      all:
        - { dimension: "财政", operator: "<=", value: 2 }
        - { event_not_triggered: "T_financial_crisis" }
    description: "国库见底，百官俸禄无法发放。"
    narrative_hint: "户部尚书跪地痛哭：'陛下，国库已空！百官俸禄、边军粮饷皆无着落！'"
    recommended_responses: ["加派新饷", "清丈追税", "裁撤冗费", "向商帮借贷"]
    default_effects:
      world_dimensions: { "派系势力": 1, "兵力": -1 }
      npc_relation_deltas: {}
  - event_id: "T_mutiny_risk"
    name: "兵变危机"
    severity: "critical"
    trigger:
      all:
        - { dimension: "兵力", operator: "<=", value: 3 }
        - { event_not_triggered: "T_mutiny_risk" }
    description: "军队哗变一触即发。"
    narrative_hint: "锦衣卫急报：'京营有人散布谣言，煽动哗变，形势危急！'"
    recommended_responses: ["补发欠饷", "斩首弹压", "换将整军"]
    default_effects:
      world_dimensions: { "派系势力": 1, "民心": -1 }
      npc_relation_deltas: {}
  - event_id: "T_civil_unrest"
    name: "民变四起"
    severity: "critical"
    trigger:
      all:
        - { dimension: "民心", operator: "<=", value: 2 }
        - { event_not_triggered: "T_civil_unrest" }
    description: "多地百姓揭竿而起。"
    narrative_hint: "各省急报纷至：'民变四起，官府已无力弹压！'"
    recommended_responses: ["开仓赈济", "招抚流民", "调兵清剿"]
    default_effects:
      world_dimensions: { "民心": -1, "财政": -1 }
      npc_relation_deltas: {}
  - event_id: "D_locust_swarm"
    name: "蝗灾"
    severity: "moderate"
    trigger:
      all:
        - { dimension: "民心", operator: "<=", value: 4 }
        - { event_not_triggered: "D_locust_swarm" }
    description: "蝗虫过境，庄稼尽毁。"
    narrative_hint: "地方急报：'蝗虫蔽日，所过之处颗粒无收！'"
    recommended_responses: ["赈粮", "免税", "迁徙安置"]
    default_effects:
      world_dimensions: { "民心": -1, "财政": -1 }
      npc_relation_deltas: {}
  - event_id: "D_earthquake"
    name: "地震"
    severity: "moderate"
    trigger:
      all:
        - { dimension: "派系势力", operator: ">=", value: 6 }
