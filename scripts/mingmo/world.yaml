schema_version: "2.0"

script_id: "mingmo"

name: "大明残照：明末风云录"

description: |
  你将置身崇祯一朝，从京师到辽东、从朝堂到民间，在内忧外患并起的十六年里做出抉择。
  五种身份共享主线国运，却各有立场与代价：每一步都可能改写王朝命运。

design_intent:
  core_conflict: "崇祯朝内忧外患——后金南侵、流贼四起、朝堂倾轧、财政枯竭，四条危机线同时逼近"
  tone: "严肃"
  choice_principles:
    - "所有国策都必须在钱粮、军力、民心与朝廷稳定之间产生明确取舍，不提供无代价的万能解法。"
    - "NPC奏报允许带有阵营偏见：边将重军饷，阁臣重名分，流贼重民困，玩家必须在不完整信息中判断。"
    - "关键决策会留下后果种子，旧案、欠饷、团练与借兵等选择会在后期以NPC行动或终局条件回返。"

gameplay:
  gameplay_types: ["权谋政斗", "战争策略"]
  world_settings: ["历史"]
  length_profile: "medium"
  player_count: 1

world_background:
  era: "明末崇祯朝（1627-1644）"
  geography: "北京紫禁城为中心，辐射辽东、陕西、河南、山海关"
  public_situation: "新君初立，魏党余波未平；边外后金窥伺，内地灾荒与流民渐成兵火，天下仍有名义秩序，却处处显露裂缝。"
  hidden_situation: "财政枯竭与行政失灵正在互相放大：朝廷每一次短期止血，都可能削弱另一条防线，并给后金、流贼或地方武人创造机会。"
  factions:
    - faction_id: "ming_court"
      name: "朝廷"
      agenda: "维系崇祯朝法统，调度钱粮军政，压住党争与地方离心。"
      resources: ["皇权名分", "官僚体系", "京师禁军", "税粮征发权"]
      conflict_with: ["later_jin", "rebel_forces", "court_factions", "eunuch_bloc"]
    - faction_id: "later_jin"
      name: "后金/清"
      agenda: "突破辽东与山海关防线，趁明廷内乱重塑天下秩序。"
      resources: ["八旗精骑", "辽东情报", "反间手段", "入关时机"]
      conflict_with: ["ming_court", "frontier_army", "rebel_forces"]
    - faction_id: "rebel_forces"
      name: "流贼义军"
      agenda: "借饥荒与苛政聚众扩张，推翻或取代明廷地方秩序。"
      resources: ["流民人潮", "机动作战", "分田免粮口号", "地方失序"]
      conflict_with: ["ming_court", "frontier_army", "later_jin"]
    - faction_id: "frontier_army"
      name: "边军"
      agenda: "守住辽东、宁锦与山海关，同时争取足够粮饷与自主指挥权。"
      resources: ["关宁铁骑", "山海关", "边防经验", "武将网络"]
      conflict_with: ["later_jin", "rebel_forces", "court_factions"]
    - faction_id: "court_factions"
      name: "朝臣党争集团"
      agenda: "在辅政、言路与财政议题中夺取话语权，保存或扩大自身派系利益。"
      resources: ["内阁票拟", "言官弹章", "地方官僚网络", "士林舆论"]
      conflict_with: ["eunuch_bloc", "frontier_army", "ming_court"]
    - faction_id: "eunuch_bloc"
      name: "宦官集团"
      agenda: "控制宫禁、厂卫和内廷情报，在皇权与外朝之间维持不可替代性。"
      resources: ["司礼监", "东厂密探", "宫禁通道", "皇帝近侍身份"]
      conflict_with: ["court_factions", "rebel_forces"]
    - faction_id: "swing_figures"
      name: "摇摆人物"
      agenda: "在乱世中保全个人、家族或部属，必要时倒向能给出生路的一方。"
      resources: ["关键情报", "私人声望", "局部军事力量", "人情牵连"]
      conflict_with: ["ming_court", "rebel_forces", "later_jin"]

dimension_definitions:
  world:
    - id: "财政"
      name: "财政"
      range: [0, 10]
      initial: 5
      higher_is_better: true
      description: "朝廷可支配的钱粮、税收与应急赈饷能力。"
    - id: "兵力"
      name: "兵力"
      range: [0, 10]
      initial: 5
      higher_is_better: true
      description: "京营、边军与地方官军的可用战力和后勤状态。"
    - id: "补给"
      name: "补给"
      range: [0, 10]
      initial: 4
      higher_is_better: true
      description: "粮草、军饷、赈灾物资的储备与调运能力。"
    - id: "情报"
      name: "情报"
      range: [0, 10]
      initial: 3
      higher_is_better: true
      description: "对敌情、朝局暗流和地方实况的掌握程度。"
    - id: "民心"
      name: "民心"
      range: [0, 10]
      initial: 5
      higher_is_better: true
      description: "百姓对朝廷的忍耐、地方治安与流民是否继续投向义军。"
    - id: "士气"
      name: "士气"
      range: [0, 10]
      initial: 5
      higher_is_better: true
      description: "军队和官员的行动意愿与战斗精神。"
    - id: "派系势力"
      name: "派系势力"
      range: [0, 10]
      initial: 5
      higher_is_better: false
      description: "朝中对抗势力的强度；越高表示权臣/党争越严重。"
  relationship_numeric:
    - id: "好感度"
      range: [0, 10]
      default: 5
      description: "NPC 对玩家个人的情绪态度与信任感。"
    - id: "忠诚度"
      range: [0, 10]
      default: 5
      description: "NPC 对玩家命令、阵营或事业的服从意愿。"
    - id: "利益绑定"
      range: [0, 10]
      default: 0
      description: "NPC 与玩家在钱粮、前途、秘密或生死处境上的绑定深度。"
  relationship_tags:
    - id: "旧交"
      modifier_hint: "+1 社交类行动"
      description: "双方曾有长期正面交情。"
    - id: "恩怨"
      modifier_hint: "-1 初次说服，+1 威胁或清算"
      description: "双方有旧怨、冤案或利益损害。"
    - id: "师生"
      modifier_hint: "+1 谏言与学术名分相关行动"
      description: "存在师承、提携或士林门生关系。"
    - id: "主仆"
      modifier_hint: "+1 命令执行，-1 平等谈判"
      description: "身份秩序明确，一方依附另一方。"
    - id: "君臣"
      modifier_hint: "+1 名分动员，叛离时后果加重"
      description: "以皇权、官职或法统维系的上下关系。"
    - id: "同僚"
      modifier_hint: "+1 协同政务，党争时易转负"
      description: "同属朝廷或军政系统，可合作也可互相弹劾。"
    - id: "政敌"
      modifier_hint: "-1 公开合作，+1 攻讦行动"
      description: "目标、派系或资源分配长期冲突。"
    - id: "宿敌"
      modifier_hint: "默认敌对，除非共同危机极高"
      description: "军事或政治上难以调和的对手。"
    - id: "私情"
      modifier_hint: "+1 安抚或交换，失败会触发额外后果"
      description: "私人感情或人情牵连能影响大局。"

time_system:
  unit: "月"
  display_format: "崇祯{year}年{month}月"
  start: { year: 1, month: 8 }
  max_time: { year: 17, month: 3 }
  turns_per_unit: 3
  auto_skip_quiet_time: true
  action_time_cost:
    min_units: 0
    max_units: 3
    default_units: 1
    description: "对话通常0个月，普通政务或军事调度1个月，长期改革、战役与赈灾2-3个月；超长行动应拆分阶段。"

timeline_milestones:
  - event_id: "E_jisi_invasion"
    name: "己巳之变"
    at: { year: 2, month: 11 }
    severity: "critical"
    description: "后金绕道蒙古入关，兵锋直逼京师。"
    narrative_hint: "凌晨，兵部尚书浑身是汗闯入寝宫——'陛下！蓟门急报！'"
    involved_factions: ["later_jin", "ming_court", "frontier_army"]
    involved_npcs: ["huang_taiji", "yuan_chonghuan"]
    prerequisites: []
    default_effects:
      world_dimensions: { "兵力": -2, "民心": -2 }
      information_added: ["I_jisi_invasion_known"]
      consequence_seed: { enabled: true, severity: "high", directions: ["京畿兵灾", "袁案疑云", "辽东空虚"] }
  - event_id: "E_yuan_arrest"
    name: "袁崇焕下狱"
    at: { year: 2, month: 12 }
    severity: "critical"
    description: "袁崇焕被押入诏狱，朝中议论纷纷。"
    narrative_hint: "锦衣卫指挥使入殿禀报：'袁崇焕已押入诏狱，百官联名上疏。'"
    involved_factions: ["ming_court", "frontier_army", "court_factions", "later_jin"]
    involved_npcs: ["yuan_chonghuan", "wen_tiren"]
    prerequisites: ["E_jisi_invasion"]
    default_effects:
      world_dimensions: { "兵力": -1, "派系势力": 1 }
      information_added: ["I_yuan_case_pressure"]
      consequence_seed: { enabled: true, severity: "medium", directions: ["辽东军心浮动", "言官攻讦", "反间得势"] }
  - event_id: "E_shaanxi_famine"
    name: "陕西大旱"
    at: { year: 3, month: 3 }
    severity: "critical"
    description: "陕西连年大旱，饥民揭竿而起。"
    narrative_hint: "陕西巡抚八百里加急：'赤地千里，饥民已聚众数万！'"
    involved_factions: ["rebel_forces", "ming_court"]
    involved_npcs: ["li_zicheng"]
    prerequisites: []
    default_effects:
      world_dimensions: { "民心": -2, "财政": -1 }
      information_added: ["I_shaanxi_famine_known"]
      consequence_seed: { enabled: true, severity: "high", directions: ["流民扩张", "赈灾钱粮缺口", "地方失控"] }
  - event_id: "D_yellow_river_flood"
    name: "黄河决口"
    at: { year: 5, month: 7 }
    severity: "critical"
    description: "黄河在开封段决口，淹没数县。"
    narrative_hint: "河南巡抚八百里加急：'黄河决口！开封以东尽成泽国，灾民数十万！'"
    involved_factions: ["ming_court", "rebel_forces"]
    involved_npcs: []
    prerequisites: []
    default_effects:
      world_dimensions: { "民心": -1, "财政": -1 }
      information_added: ["I_yellow_river_refugees"]
      consequence_seed: { enabled: true, severity: "medium", directions: ["赈灾不力", "河南流民", "地方贪腐"] }
  - event_id: "E_huang_taiji_reform"
    name: "后金改国号"
    at: { year: 9, month: 4 }
    severity: "moderate"
    description: "皇太极改国号为清，称帝建元。"
    narrative_hint: "边关探马回报：'奴酋已改国号为清，自称皇帝，野心昭然。'"
    involved_factions: ["later_jin", "ming_court"]
    involved_npcs: ["huang_taiji", "dorgon"]
    prerequisites: []
    default_effects:
      world_dimensions: { "兵力": -1, "派系势力": 1 }
      information_added: ["I_qing_state_declared"]
      consequence_seed: { enabled: true, severity: "medium", directions: ["清军制度化", "边防压力升级"] }
  - event_id: "D_drought_henan"
    name: "河南大旱"
    at: { year: 10, month: 6 }
    severity: "moderate"
    description: "河南连月无雨，赤地千里。"
    narrative_hint: "河南巡抚泣血上疏：'连旱三月，井泉枯竭，百姓易子而食！'"
    involved_factions: ["ming_court", "rebel_forces"]
    involved_npcs: ["li_zicheng", "zhang_xianzhong"]
    prerequisites: []
    default_effects:
      world_dimensions: { "民心": -1, "财政": -1 }
      information_added: ["I_henan_drought_known"]
      consequence_seed: { enabled: true, severity: "medium", directions: ["流民入伙", "赈粮争夺"] }
  - event_id: "E_songjin_battle"
    name: "松锦大战"
    at: { year: 14, month: 2 }
    severity: "critical"
    description: "明清在松山锦州展开决战。"
    narrative_hint: "前线急报如雪片飞来：'松山被围，粮道已断！'"
    involved_factions: ["frontier_army", "later_jin", "ming_court"]
    involved_npcs: ["wu_sangui", "huang_taiji"]
    prerequisites: []
    default_effects:
      world_dimensions: { "兵力": -5 }
      information_added: ["I_songjin_crisis"]
