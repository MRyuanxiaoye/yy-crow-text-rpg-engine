opening_narration: |
  陕豫连岁旱蝗，赤地千里。饥民初为求活，继而揭竿；官军剿抚反复，
  今日招安、明日复叛已成常态。驿路上传来同一种哭声：
  粮在仓中，人在道旁。若只见贼势，不见民困，火会越烧越旺。
