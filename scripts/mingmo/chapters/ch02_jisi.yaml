opening_narration: |
  北风卷地，关外烽烟忽从蓟门以北一路压来。后金避实击虚，绕关而进，
  京师百里内仓皇闭市，百姓扶老携幼涌向城门。朝中争论昼夜不绝：
  是固守待援，还是出师截击？一着失当，便是社稷蒙尘。
