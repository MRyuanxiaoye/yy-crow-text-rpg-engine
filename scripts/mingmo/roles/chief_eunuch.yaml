      - dimension: 意志
        operator: '>='
        value: 8
      - dimension: 派系势力
        operator: <=
        value: 6
    description: 你把厂卫变成护主与纠偏的暗线，虽仍背负宦官之名，却在关键时刻保住了中枢。
    epilogue_hooks:
    - 密报功劳
    - 皇帝信任
    - 外朝余疑
  - ending_id: END_eunuch_hidden_regent
    tier: silver
    name: 司礼监摄局
    priority: 80
    conditions:
      all:
      - dimension: 智谋
        operator: '>='
        value: 8
      - dimension: 派系势力
        operator: <=
        value: 6
    description: 奏疏经你手而轻重有别，内廷在危局中成为实际枢纽；天下得一时效率，也埋下新争议。
    epilogue_hooks:
    - 票拟之争
    - 东厂扩张
    - 阁臣妥协
  - ending_id: END_eunuch_power_usurper
    tier: mixed
    name: 厂卫夺权
