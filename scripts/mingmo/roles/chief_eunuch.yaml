role_events:
  timeline:
  - event_id: RE_eunuch_factory_boundary
    name: 厂卫边界
    at:
      year: 1
      month: 10
    severity: major
    description: 外朝要求限制东厂，皇帝却要你继续查清魏党余脉。
    narrative_hint: 从大宦官视角呈现为直接压力，而非客观史料。
    involved_npcs:
    - wen_tiren
    - zhou_yanru
    recommended_responses:
    - 扩权密查
    - 交法司审理
    - 内外双轨
    default_effects:
      world_dimensions: {}
      role_dimensions: {}
      npc_relation_deltas: {}
      information_added:
