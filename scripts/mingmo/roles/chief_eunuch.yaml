    conditions:
      all:
      - dimension: 智谋
        operator: '>='
        value: 8
      - dimension: 意志
        operator: <=
        value: 4
    description: 你用密探与宫禁控制压倒外朝，短期无人敢逆，长期却使皇权与宦权的界线彻底混淆。
    epilogue_hooks:
    - 冤案名单
    - 皇帝疏离
    - 士林仇怨
  - ending_id: END_eunuch_martyr
    tier: mixed
    name: 随主殉节
    priority: 50
    conditions:
      all:
      - dimension: 意志
        operator: '>='
        value: 7
      - dimension: 兵力
        operator: <=
        value: 3
    description: 城破之际你没有逃，随主赴死让史笔添一重悲烈，也让宦官二字难以只被骂名覆盖。
    epilogue_hooks:
    - 煤山尾声
    - 宫人散亡
    - 后世评价
  - ending_id: END_eunuch_purged
    tier: failure
    name: 东厂清算
    priority: 10
    conditions:
      all:
      - dimension: 派系势力
        operator: '>='
        value: 10
    description: 旧案、勒索与党争反噬而来，外朝以清君侧为名扫荡内廷，你的权势在一夜间化为罪证。
    epilogue_hooks:
    - 线人出卖
    - 档案焚毁
    - 家族牵连
narration_style:
  person: second_person
  player_address: 公公
  narrator_voice: 宫禁低语、密报和廷议影子相互穿插，语气谨慎阴冷，强调近侍权力的边界
  information_delivery:
    fallback_enabled: true
    fallback_after_units: 3
    fallback_style: 以急报、密折、军报、传闻或营中对话自然补足信息。
  taboo:
  - 不要直接剧透隐藏真相
  - 不要替玩家做价值判断
  - 不要把历史必然写成玩家无能
information_pool:
- info_id: I_eunuch_palace_whispers
  type: persistent
  content: 宫中有人暗通外臣，消息真假混杂，正适合也最危险于厂卫介入。
  known_by:
  - wang_chengen
  delivery_priority: high
  expires_after_units: null
  delivered_by: []
