    severity: minor
    description: 东厂番子送来一份真假难辨的宫外密报。
    default_effects:
      npc_relation_deltas: {}
endings:
  bottom_lines:
  - bottom_line_id: BL_eunuch_purge
    name: 内廷被清算
    condition:
