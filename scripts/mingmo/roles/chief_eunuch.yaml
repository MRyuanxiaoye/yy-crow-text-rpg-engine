schema_version: '2.0'
world_script_id: mingmo
role:
  role_id: chief_eunuch
  name: 大宦官
  source_npc_id: wang_chengen
  identity: 司礼监与厂卫暗线的掌控者
  perspective: 暗线
  start_location: 司礼监直房
  initial_scene:
    context: 乾清宫灯火未灭，外朝弹章要求收束厂卫，皇帝却仍要你查清魏党、袁案与宫中异动。你站在门槛内外，听见两边都在说你不可尽信。
    present_npcs:
    - wen_tiren
    - zhou_yanru
    - sun_chengzong
    immediate_choices_hint:
    - 扩张东厂密探
    - 向皇帝直呈密报
    - 与内阁交换情报
player_goal:
  core_goal: 以宫禁、东厂与司礼监信息网影响国运，在忠君、保权与自保之间选择宦官集团的结局。
  success_definition: 皇帝或内廷核心未被孤立，厂卫情报发挥关键作用，且宦官集团没有因滥权被彻底清算。
  default_failure_trajectory:
    summary: 若玩家长期无作为，财政、军心、民心与政治信任会互相拖垮，角色目标被历史默认线吞没。
    stages:
    - phase_id: failure_stage_1
      name: 隐患显现
      trigger_hint: 早期里程碑到来或关键维度降至4。
      description: 奏报、流言或军情开始互相矛盾，角色必须牺牲一部分目标止血。
    - phase_id: failure_stage_2
      name: 局势失控
      trigger_hint: 中期多个世界维度低于3，或角色核心维度跌破警戒。
      description: NPC开始按自身目标主动行动，玩家不再能用单一命令统合局面。
    - phase_id: failure_stage_3
      name: 默认失败
      trigger_hint: 底线条件被击穿或崇祯十七年三月到达。
      description: 京师、边防、内阁、义军或宫禁之一彻底崩坏，进入失败或苦涩结算。
opening:
  icebreaker_hint: "乾清宫灯火未灭，外朝弹章与宫禁密报同时送到你手上。"
  action_modes:
    - mode_id: status_briefing
      label: "查阅密报与弹章"
      icon: "📋"
      description: "翻看东厂密探呈上的密报和外朝送来的弹章"
      route: status_briefing
    - mode_id: court_session
      label: "召集心腹议事"
      icon: "🔒"
      description: "在直房召集几个关键人商量"
      route: court_session
      route_params:
        topic: "厂卫收束与宫禁情报安排"
        target_npcs: ["温体仁", "周延儒"]
    - mode_id: npc_select
      label: "私下传见"
      icon: "🤝"
      description: "传一人来私下交底"
      route: npc_select
pressure_sources:
  decay:
  - pressure_id: P_eunuch_legitimacy_decay
    dimension: 派系势力
    rate: 1
    per: 月
    floor: 0
    narrative: 厂卫越活跃，外朝越容易把危机归咎于内廷干政。
    counterplay:
    - 公开边界
    - 交还部分案件
    - 与内阁共署
  - pressure_id: P_eunuch_risk_growth
    dimension: 派系势力
    rate: 1
    per: 月
    floor: 10
    narrative: 密探、冤案和勒索会积累为未来清算理由。
    counterplay:
    - 销毁把柄
    - 约束爪牙
    - 用实绩换信任
  milestones:
  - pressure_id: P_jisi_invasion
    at:
      year: 2
      month: 11
    event_id: E_jisi_invasion
    description: 己巳之变必然逼近京师与边防。
    can_be_prepared_for: true
  - pressure_id: P_shaanxi_famine
    at:
      year: 3
      month: 3
    event_id: E_shaanxi_famine
    description: 陕西大旱会把民困推成兵火。
    can_be_prepared_for: true
  - pressure_id: P_songjin_battle
    at:
      year: 14
      month: 2
    event_id: E_songjin_battle
    description: 松锦大战是边防与国力的一次总账。
    can_be_prepared_for: true
  - pressure_id: P_li_march
    at:
      year: 17
      month: 1
    event_id: E_li_zicheng_march
    description: 闯军东进会迫使所有角色进入终局。
    can_be_prepared_for: true
  reactions:
  - pressure_id: P_chief_eunuch_low_treasury
    trigger:
      all:
      - dimension: 财政
        operator: <=
        value: 2
    event_id: T_financial_crisis
    cooldown_units: 3
    description: 国库过低会触发欠饷、赈灾和官僚停摆的连锁反应。
  - pressure_id: P_chief_eunuch_low_people
    trigger:
      all:
      - dimension: 民心
        operator: <=
        value: 2
    event_id: T_civil_unrest
    cooldown_units: 3
    description: 民心过低时，地方会把灾荒转化为民变。
  - pressure_id: P_eunuch_purge_reaction
    trigger:
      all:
      - dimension: 派系势力
        operator: '>='
        value: 8
    event_id: RE_eunuch_censor_attack
    cooldown_units: 2
    description: 厂卫积怨过高时，外朝会主动发起清君侧。
role_dimensions:
  definitions:
  - id: 武力
    name: 武力
    range:
    - 0
    - 10
    initial: 2
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 个人战斗、军事指挥或武力威慑能力。
  - id: 智谋
    name: 智谋
    range:
    - 0
    - 10
    initial: 7
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 分析局势、谋划策略和识破计谋的能力。
  - id: 口才
    name: 口才
    range:
    - 0
    - 10
    initial: 5
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 说服、谈判和公开表达能力。
  - id: 意志
    name: 意志
    range:
    - 0
    - 10
    initial: 6
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 承压、坚持、抗诱惑和精神韧性。
  - id: 感知
    name: 感知
    range:
    - 0
    - 10
    initial: 7
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 观察、直觉、侦查和察觉异常能力。
  - id: 魅力
    name: 魅力
    range:
    - 0
    - 10
    initial: 4
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 个人吸引力、亲和力和社交影响力。
  world_dimension_overrides:
    派系势力:
      add: 1
    财政:
      set: 5
    民心:
      add: -1
