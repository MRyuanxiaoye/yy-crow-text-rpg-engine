schema_version: '2.0'
world_script_id: mingmo
role:
  role_id: grand_secretary
  name: 内阁首辅
  source_npc_id: zhou_yanru
  identity: 辅政首臣，票拟与百官调度的核心
  perspective: 朝堂
  start_location: 内阁值房
  initial_scene:
    context: 兵部索饷、户部叫穷、言官弹章堆满案头。皇帝要一个立刻见效的方案，而你知道每个方案都会得罪一批人。
    present_npcs:
    - wen_tiren
    - sun_chengzong
    - wang_chengen
    immediate_choices_hint:
    - 先定财政方案
    - 压住言官党争
    - 争取皇帝授权
player_goal:
  core_goal: 让内阁成为真正可运转的危机中枢，稳住财政、言路与皇帝信任，避免被党争吞没。
  success_definition: 朝廷稳定维持在警戒线以上，财政获得续命方案，内阁没有沦为崩局替罪羊。
  default_failure_trajectory:
    summary: 若玩家长期无作为，财政、军心、民心与政治信任会互相拖垮，角色目标被历史默认线吞没。
    stages:
    - phase_id: failure_stage_1
      name: 隐患显现
      trigger_hint: 早期里程碑到来或关键维度降至4。
      description: 奏报、流言或军情开始互相矛盾，角色必须牺牲一部分目标止血。
    - phase_id: failure_stage_2
      name: 局势失控
      trigger_hint: 中期多个世界维度低于3，或角色核心维度跌破警戒。
      description: NPC开始按自身目标主动行动，玩家不再能用单一命令统合局面。
    - phase_id: failure_stage_3
      name: 默认失败
      trigger_hint: 底线条件被击穿或崇祯十七年三月到达。
      description: 京师、边防、内阁、义军或宫禁之一彻底崩坏，进入失败或苦涩结算。
opening:
  icebreaker_hint: "兵部催饷折子压着户部叫穷的回文，言官弹章堆满案头，皇帝要立刻见效的方案。"
  action_modes:
    - mode_id: status_briefing
      label: "审阅六部呈文"
      icon: "📋"
      description: "翻阅六部送达内阁的公文与急件"
      route: status_briefing
    - mode_id: court_session
      label: "召集阁议"
      icon: "🏛️"
      description: "在值房召集相关大臣商议对策"
      route: court_session
      route_params:
        topic: "财政与言路危机的应对"
        target_npcs: ["温体仁", "孙承宗", "王承恩"]
    - mode_id: npc_select
      label: "私下约谈"
      icon: "🤝"
      description: "单独约见一人，摸底或交换筹码"
      route: npc_select
pressure_sources:
  decay:
  - pressure_id: P_secretary_factional_wear
    dimension: 派系势力
    rate: 1
    per: 月
    floor: 0
    narrative: 言官与阁臣互相攻讦，使中枢执行力持续下降。
    counterplay:
    - 调停廷议
    - 更换部院人事
    - 公开责任边界
  - pressure_id: P_secretary_budget_deadline
    dimension: 财政
    rate: -1
    per: 月
    floor: 0
    narrative: 边饷与赈灾都向内阁逼账，拖延本身就是损失。
    counterplay:
    - 清丈田亩
    - 整顿商税
    - 裁撤冗官
  milestones:
  - pressure_id: P_jisi_invasion
    at:
      year: 2
      month: 11
    event_id: E_jisi_invasion
    description: 己巳之变必然逼近京师与边防。
    can_be_prepared_for: true
  - pressure_id: P_shaanxi_famine
    at:
      year: 3
      month: 3
    event_id: E_shaanxi_famine
    description: 陕西大旱会把民困推成兵火。
    can_be_prepared_for: true
  - pressure_id: P_songjin_battle
    at:
      year: 14
      month: 2
    event_id: E_songjin_battle
    description: 松锦大战是边防与国力的一次总账。
    can_be_prepared_for: true
  - pressure_id: P_li_march
    at:
      year: 17
      month: 1
    event_id: E_li_zicheng_march
    description: 闯军东进会迫使所有角色进入终局。
    can_be_prepared_for: true
  reactions:
  - pressure_id: P_grand_secretary_low_treasury
    trigger:
      all:
      - dimension: 财政
        operator: <=
        value: 2
    event_id: T_financial_crisis
    cooldown_units: 3
    description: 国库过低会触发欠饷、赈灾和官僚停摆的连锁反应。
  - pressure_id: P_grand_secretary_low_people
    trigger:
      all:
      - dimension: 民心
        operator: <=
        value: 2
    event_id: T_civil_unrest
    cooldown_units: 3
    description: 民心过低时，地方会把灾荒转化为民变。
