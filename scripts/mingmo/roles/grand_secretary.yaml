role_events:
  timeline:
  - event_id: RE_secretary_budget_council
    name: 三部会计
    at:
      year: 5
      month: 1
    severity: major
    description: 户部、兵部与地方抚按的账目彼此矛盾，必须定一套钱粮优先级。
    narrative_hint: 从内阁首辅视角呈现为直接压力，而非客观史料。
    involved_npcs:
    - wen_tiren
    - sun_chengzong
    recommended_responses:
    - 加派辽饷
    - 清丈追税
    - 裁撤冗费
    default_effects:
      world_dimensions: {}
      role_dimensions: {}
      npc_relation_deltas: {}
      information_added:
      - I_secretary_budget_council
  conditional:
  - event_id: RE_secretary_blame_storm
    name: 弹章归罪
    trigger:
      all:
      - dimension: 财政
        operator: <=
        value: 2
    severity: critical
    description: 财政濒危时，政敌把每一笔欠饷都归入首辅失职。
