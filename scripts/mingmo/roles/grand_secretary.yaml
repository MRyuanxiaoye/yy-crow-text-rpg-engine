    - 政敌得势
    - 朝廷余震
narration_style:
  person: second_person
  player_address: 首辅
  narrator_voice: 奏疏、廷议与私下交换并行，语气含蓄克制，强调名分、流程和背后交易
  information_delivery:
    fallback_enabled: true
    fallback_after_units: 3
    fallback_style: 以急报、密折、军报、传闻或营中对话自然补足信息。
  taboo:
  - 不要直接剧透隐藏真相
  - 不要替玩家做价值判断
  - 不要把历史必然写成玩家无能
information_pool:
- info_id: I_secretary_treasury_truth
  type: persistent
  content: 户部真实亏空比公开奏报更深，任何拖延都会把欠饷推向兵变。
  known_by:
  - wang_chengen
  - wen_tiren
  delivery_priority: urgent
  expires_after_units: null
  delivered_by: []
- info_id: I_secretary_wen_attack
  type: escalating
  content: 温体仁正在把财政失误与首辅责任绑定。
  known_by:
  - wen_tiren
  delivery_priority: high
  expires_after_units: null
  severity: 1
  escalation:
    1: 温体仁正在把财政失误与首辅责任绑定。
    2: 该线索开始影响NPC判断。
    3: 若继续忽视，将触发被动响应。
  max_severity_event: RE_secretary_blame_storm
  delivered_by: []
