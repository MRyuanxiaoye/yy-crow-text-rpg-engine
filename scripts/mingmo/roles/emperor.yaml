schema_version: '2.0'
world_script_id: mingmo
role:
  role_id: emperor
  name: 崇祯皇帝
  source_npc_id: ''
  identity: 大明天子，崇祯朝最高决策者
  perspective: 全局
  start_location: 乾清宫东暖阁
  initial_scene:
    context: 先帝梓宫未远，魏党余脉仍在厂卫与地方要津。内阁、司礼监和老臣同时入见，人人都在试探新君的刀该落向何处。
    present_npcs:
    - wen_tiren
    - sun_chengzong
    - wang_chengen
    immediate_choices_hint:
    - 处置魏党余脉
    - 重整言路与厂卫
    - 询问辽东与国库实情
player_goal:
  core_goal: 在崇祯十七年内守住大明法统，化解财政、边防、民变与党争的连锁崩塌。
  success_definition: 京师或合法中枢未失，至少两条危机线被压低，且国库、民心、军力中至少两项维持在可续命水平。
  default_failure_trajectory:
    summary: 若玩家长期无作为，财政、军心、民心与政治信任会互相拖垮，角色目标被历史默认线吞没。
    stages:
    - phase_id: failure_stage_1
      name: 隐患显现
      trigger_hint: 早期里程碑到来或关键维度降至4。
      description: 奏报、流言或军情开始互相矛盾，角色必须牺牲一部分目标止血。
    - phase_id: failure_stage_2
      name: 局势失控
      trigger_hint: 中期多个世界维度低于3，或角色核心维度跌破警戒。
      description: NPC开始按自身目标主动行动，玩家不再能用单一命令统合局面。
    - phase_id: failure_stage_3
      name: 默认失败
      trigger_hint: 底线条件被击穿或崇祯十七年三月到达。
      description: 京师、边防、内阁、义军或宫禁之一彻底崩坏，进入失败或苦涩结算。
initial_agenda:
  - id: agenda_weigui_cleanup
    description: '处置魏忠贤余党——朝中仍有魏党残余势力，必须做出清洗力度的决定'
    urgency: urgent
    consequence: '拖延不决将使朝臣对新君魄力产生质疑，派系势力持续膨胀'
    relevant_npcs: ['温体仁', '王承恩', '锦衣卫指挥使', '刑部尚书']
  - id: agenda_liaodong_defense
    description: '辽东军情紧急——边军粮饷拖欠数月，宁远前线急需定策'
    urgency: urgent
    consequence: '欠饷过久边军可能哗变，士气与兵力同时下滑'
    relevant_npcs: ['袁崇焕', '孙承宗', '兵部尚书', '户部尚书']
  - id: agenda_cabinet_vacancy
    description: '内阁空缺——首辅人选悬而未决，朝政运转迟缓'
    urgency: normal
    consequence: '无首辅则六部各行其是，政令难以统一'
    relevant_npcs: ['温体仁', '周延儒', '吏部尚书']
  - id: agenda_famine_report
    description: '陕西灾报——陕西连年旱灾，流民渐成隐患'
    urgency: normal
    consequence: '若不及时赈济，流民可能被裹挟为流贼'
    relevant_npcs: ['户部尚书', '工部尚书']
opening:
  icebreaker_hint: "新君初登大宝，魏党余脉盘踞，内阁、司礼监同时入见试探刀锋。"
  action_modes:
    - mode_id: status_briefing
      label: "查阅奏章急报"
      icon: "📋"
      description: "翻阅内阁呈上的折子与各方急报"
      route: status_briefing
    - mode_id: court_session
      label: "上朝议事"
      icon: "🏛️"
      description: "召集在场大臣当面议事"
      route: court_session
      route_params:
        topic: "先帝驾崩后的朝政安排"
        target_npcs: ["温体仁", "孙承宗", "王承恩"]
    - mode_id: npc_select
      label: "召见近臣密谈"
      icon: "🤝"
      description: "私下召见一人，听取不便公开的消息"
      route: npc_select
pressure_sources:
  decay:
  - pressure_id: P_emperor_treasury_drain
    dimension: 财政
    rate: -1
    per: 月
    floor: 0
    narrative: 边饷、赈灾与宫廷运转持续吞噬国库。
    counterplay:
    - 清丈田亩
    - 裁撤冗费
    - 向商帮借贷
  - pressure_id: P_emperor_public_patience
    dimension: 民心
    rate: -1
    per: 月
    floor: 1
    narrative: 灾荒与加派会不断消磨百姓忍耐。
    counterplay:
    - 减免税赋
    - 开仓赈济
    - 惩办贪腐
  milestones:
  - pressure_id: P_jisi_invasion
    at:
      year: 2
      month: 11
    event_id: E_jisi_invasion
    description: 己巳之变必然逼近京师与边防。
    can_be_prepared_for: true
  - pressure_id: P_shaanxi_famine
    at:
      year: 3
      month: 3
    event_id: E_shaanxi_famine
    description: 陕西大旱会把民困推成兵火。
    can_be_prepared_for: true
  - pressure_id: P_songjin_battle
    at:
      year: 14
      month: 2
    event_id: E_songjin_battle
    description: 松锦大战是边防与国力的一次总账。
    can_be_prepared_for: true
  - pressure_id: P_li_march
    at:
      year: 17
      month: 1
    event_id: E_li_zicheng_march
    description: 闯军东进会迫使所有角色进入终局。
    can_be_prepared_for: true
  reactions:
  - pressure_id: P_emperor_low_treasury
    trigger:
      all:
      - dimension: 财政
        operator: '<='
        value: 2
    event_id: T_financial_crisis
    cooldown_units: 3
    description: 国库过低会触发欠饷、赈灾和官僚停摆的连锁反应。
  - pressure_id: P_emperor_low_people
    trigger:
      all:
      - dimension: 民心
        operator: '<='
        value: 2
    event_id: T_civil_unrest
    cooldown_units: 3
    description: 民心过低时，地方会把灾荒转化为民变。
