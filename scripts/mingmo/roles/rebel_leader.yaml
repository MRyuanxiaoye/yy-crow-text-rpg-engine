role_events:
  timeline:
  - event_id: RE_rebel_grain_oath
    name: 分粮立誓
    at:
      year: 3
      month: 4
    severity: major
    description: 饥民要求你兑现分田免粮，部将则要求先取城池。
    narrative_hint: 从起义领袖视角呈现为直接压力，而非客观史料。
    involved_npcs:
    - zhang_xianzhong
    recommended_responses:
    - 开仓分粮
    - 攻城取粮
    - 接受招安
    default_effects:
      world_dimensions: {}
      role_dimensions: {}
      npc_relation_deltas: {}
      information_added:
