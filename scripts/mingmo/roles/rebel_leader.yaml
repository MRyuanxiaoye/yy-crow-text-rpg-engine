schema_version: '2.0'
world_script_id: mingmo
role:
  role_id: rebel_leader
  name: 起义领袖
  source_npc_id: li_zicheng
  identity: 闯军首领，饥民与义军的共同旗帜
  perspective: 民间
  start_location: 陕豫流民大营
  initial_scene:
    context: 陕西赤地千里，饥民围在营外等一口粮。有人劝你立刻攻城，有人劝招安求活，也有人开始谈“分田免粮”的旗号。
    present_npcs:
    - zhang_xianzhong
    - chen_yuanyuan
    - zhou_yanru
    immediate_choices_hint:
    - 开仓分粮立信
    - 攻打州县夺粮
    - 派人试探招安
player_goal:
  core_goal: 把求活之众整合成能争天下的新秩序，在明廷、清军和内部军纪之间守住民心。
  success_definition: 义军保有民心和兵力，攻占关键地区或迫使明廷承认新秩序，且没有被军纪失控反噬。
  default_failure_trajectory:
    summary: 若玩家长期无作为，财政、军心、民心与政治信任会互相拖垮，角色目标被历史默认线吞没。
    stages:
    - phase_id: failure_stage_1
      name: 隐患显现
      trigger_hint: 早期里程碑到来或关键维度降至4。
      description: 奏报、流言或军情开始互相矛盾，角色必须牺牲一部分目标止血。
    - phase_id: failure_stage_2
      name: 局势失控
      trigger_hint: 中期多个世界维度低于3，或角色核心维度跌破警戒。
      description: NPC开始按自身目标主动行动，玩家不再能用单一命令统合局面。
    - phase_id: failure_stage_3
      name: 默认失败
      trigger_hint: 底线条件被击穿或崇祯十七年三月到达。
      description: 京师、边防、内阁、义军或宫禁之一彻底崩坏，进入失败或苦涩结算。
opening:
  icebreaker_hint: "营外饥民越聚越多，部将催你拿主意——是攻城抢粮还是派人去谈招安。"
  action_modes:
    - mode_id: status_briefing
      label: "听取斥候回报"
      icon: "📋"
      description: "让探马和细作汇报周边官军与粮仓情报"
      route: status_briefing
    - mode_id: court_session
      label: "召集头领议事"
      icon: "🔥"
      description: "把几位核心头领叫到大帐商量"
      route: court_session
      route_params:
        topic: "下一步是攻城、流动还是招安"
        target_npcs: ["张献忠"]
    - mode_id: npc_select
      label: "找人单独谈"
      icon: "🤝"
      description: "叫一个人过来私下说话"
      route: npc_select
pressure_sources:
  decay:
  - pressure_id: P_rebel_food_pressure
    dimension: 兵力
    rate: -1
    per: 月
    floor: 1
    narrative: 流民越聚越多，粮草若断，义军会迅速散乱。
    counterplay:
    - 攻仓取粮
    - 分田筹粮
    - 与地方豪强交易
  - pressure_id: P_rebel_discipline_pressure
    dimension: 士气
    rate: -1
    per: 月
    floor: 0
    narrative: 长期流动作战会诱发抢掠和私斗，损害民心。
    counterplay:
    - 严明军法
    - 设立粮官
    - 公开惩戒
  milestones:
  - pressure_id: P_jisi_invasion
    at:
      year: 2
      month: 11
    event_id: E_jisi_invasion
    description: 己巳之变必然逼近京师与边防。
    can_be_prepared_for: true
  - pressure_id: P_shaanxi_famine
    at:
      year: 3
      month: 3
    event_id: E_shaanxi_famine
    description: 陕西大旱会把民困推成兵火。
    can_be_prepared_for: true
  - pressure_id: P_songjin_battle
    at:
      year: 14
      month: 2
    event_id: E_songjin_battle
    description: 松锦大战是边防与国力的一次总账。
    can_be_prepared_for: true
  - pressure_id: P_li_march
    at:
      year: 17
      month: 1
    event_id: E_li_zicheng_march
    description: 闯军东进会迫使所有角色进入终局。
    can_be_prepared_for: true
  reactions:
  - pressure_id: P_rebel_leader_low_treasury
    trigger:
      all:
      - dimension: 财政
        operator: <=
        value: 2
    event_id: T_financial_crisis
    cooldown_units: 3
    description: 财政过低会触发欠饷、赈灾和官僚停摆的连锁反应。
  - pressure_id: P_rebel_leader_low_people
    trigger:
      all:
      - dimension: 民心
        operator: <=
        value: 2
    event_id: T_civil_unrest
    cooldown_units: 3
    description: 民心过低时，地方会把灾荒转化为民变。
