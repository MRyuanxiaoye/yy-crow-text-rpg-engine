        operator: '>='
        value: 6
    description: 你把“分田免粮”从口号变为制度，闯军入主京师后没有立刻失控，一个新政权艰难开局。
    epilogue_hooks:
    - 入京军纪
    - 旧官任用
    - 清军威胁
  - ending_id: END_rebel_people_king
    tier: silver
    name: 民心闯王
    priority: 85
    conditions:
      all:
      - dimension: 民心
        operator: '>='
        value: 6
      - dimension: 士气
        operator: '>='
        value: 5
    description: 你未必夺得全天下，却让饥民知道义军不是另一支劫掠之师，明廷再难用“贼”字概括你。
