      - dimension: 兵力
        operator: <=
        value: 5
    description: 你接受招安换来部众暂活，却也让旗号分裂；有人称你识时务，有人说你背弃饥民。
    epilogue_hooks:
    - 部众分裂
    - 朝廷封赏
    - 旧怨难平
  - ending_id: END_rebel_bloody_warlord
    tier: mixed
    name: 血火割据
    priority: 45
    conditions:
      all:
      - dimension: 兵力
        operator: '>='
        value: 6
      - dimension: 民心
        operator: <=
        value: 3
    description: 你靠恐惧夺城立威，地盘扩大，民心却从拥戴转为畏惧，新秩序变成另一场兵祸。
    epilogue_hooks:
    - 军纪崩坏
    - 地方逃亡
    - 张献忠合流
  - ending_id: END_rebel_scattered
    tier: failure
    name: 饥军散尽
    priority: 10
    conditions:
      all:
      - dimension: 兵力
        operator: <=
        value: 0
    description: 粮尽、军散、首领失信，曾经追随你的饥民重新流亡，旗号被风吹落泥中。
    epilogue_hooks:
    - 幸存部众
    - 明廷追剿
    - 流民余烬
narration_style:
  person: second_person
  player_address: 闯王
  narrator_voice: 民间传闻、军营号令与饥民哭声并置，语言直白有煽动力，强调求活与建制的张力
  information_delivery:
    fallback_enabled: true
    fallback_after_units: 3
    fallback_style: 以急报、密折、军报、传闻或营中对话自然补足信息。
  taboo:
  - 不要直接剧透隐藏真相
  - 不要替玩家做价值判断
  - 不要把历史必然写成玩家无能
