    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 个人战斗、军事指挥或武力威慑能力。
  - id: 智谋
    name: 智谋
    range:
    - 0
    - 10
    initial: 6
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
    description: 分析局势、谋划策略和识破计谋的能力。
  - id: 口才
    name: 口才
    range:
    - 0
    - 10
    initial: 4
    growth: 行动成功、关键谈判或重大历史节点后可提升；通常不因单次失败下降。
