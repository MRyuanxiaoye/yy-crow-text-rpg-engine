schema_version: '2.0'
world_script_id: mingmo
role:
  role_id: frontier_general
  name: 边关将领
  source_npc_id: yuan_chonghuan
  identity: 辽东督师与关宁防线主将
  perspective: 军事
  start_location: 宁锦前线军机幕府
  initial_scene:
    context: 蓟门风急，后金骑兵绕道南下。京师急诏与前线探报同时抵达，粮草不足，言官却已开始质疑你的忠诚。
    present_npcs:
    - sun_chengzong
    - wu_sangui
    - huang_taiji
    immediate_choices_hint:
    - 固守宁锦
    - 回援京师
    - 向朝廷索取军饷与信任
player_goal:
  core_goal: 守住辽东与山海关防线，保全关宁军骨干，并在朝廷疑忌中证明边将不可轻弃。
  success_definition: 边防与军力保持可战水平，自己未被党争彻底牺牲，后金入关窗口被推迟或关闭。
  default_failure_trajectory:
    summary: 若玩家长期无作为，财政、军心、民心与政治信任会互相拖垮，角色目标被历史默认线吞没。
    stages:
    - phase_id: failure_stage_1
      name: 隐患显现
      trigger_hint: 早期里程碑到来或关键维度降至4。
      description: 奏报、流言或军情开始互相矛盾，角色必须牺牲一部分目标止血。
    - phase_id: failure_stage_2
      name: 局势失控
      trigger_hint: 中期多个世界维度低于3，或角色核心维度跌破警戒。
      description: NPC开始按自身目标主动行动，玩家不再能用单一命令统合局面。
    - phase_id: failure_stage_3
      name: 默认失败
      trigger_hint: 底线条件被击穿或崇祯十七年三月到达。
      description: 京师、边防、内阁、义军或宫禁之一彻底崩坏，进入失败或苦涩结算。
opening:
  icebreaker_hint: "前线探报与京师急诏同时压到帅案，粮草不足，言官弹章已在路上。"
  action_modes:
    - mode_id: status_briefing
      label: "查看军报与塘报"
      icon: "📋"
      description: "翻阅前线斥候探报与京师来函"
      route: status_briefing
    - mode_id: court_session
      label: "召开幕府军议"
      icon: "⚔️"
      description: "召集在营将领议论军务"
      route: court_session
      route_params:
        topic: "前线军情与粮饷部署"
        target_npcs: ["孙承宗", "吴三桂"]
    - mode_id: npc_select
      label: "单独面见部将"
      icon: "🤝"
      description: "私下与一名将领或幕僚谈话"
      route: npc_select
pressure_sources:
  decay:
  - pressure_id: P_general_supply_shortage
    dimension: 兵力
    rate: -1
    per: 月
    floor: 1
    narrative: 欠饷与粮道不稳会直接侵蚀军心与战力。
    counterplay:
    - 奏请军饷
    - 就地筹粮
    - 精简防区
  - pressure_id: P_general_border_pressure
    dimension: 兵力
    rate: -1
    per: 月
    floor: 0
    narrative: 清军持续侦骑、围点和反间，使防线不断失血。
    counterplay:
    - 修堡筑台
    - 主动侦察
    - 联合吴三桂
  milestones:
  - pressure_id: P_jisi_invasion
    at:
      year: 2
      month: 11
    event_id: E_jisi_invasion
    description: 己巳之变必然逼近京师与边防。
    can_be_prepared_for: true
  - pressure_id: P_shaanxi_famine
    at:
      year: 3
      month: 3
    event_id: E_shaanxi_famine
    description: 陕西大旱会把民困推成兵火。
    can_be_prepared_for: true
  - pressure_id: P_songjin_battle
    at:
      year: 14
      month: 2
    event_id: E_songjin_battle
    description: 松锦大战是边防与国力的一次总账。
    can_be_prepared_for: true
  - pressure_id: P_li_march
    at:
      year: 17
      month: 1
    event_id: E_li_zicheng_march
    description: 闯军东进会迫使所有角色进入终局。
    can_be_prepared_for: true
  reactions:
  - pressure_id: P_frontier_general_low_treasury
    trigger:
      all:
      - dimension: 财政
        operator: <=
        value: 2
    event_id: T_financial_crisis
    cooldown_units: 3
    description: 国库过低会触发欠饷、赈灾和官僚停摆的连锁反应。
  - pressure_id: P_frontier_general_low_people
    trigger:
      all:
      - dimension: 民心
        operator: <=
        value: 2
    event_id: T_civil_unrest
    cooldown_units: 3
    description: 民心过低时，地方会把灾荒转化为民变。
  - pressure_id: P_general_mutiny
    trigger:
      all:
      - dimension: 兵力
        operator: <=
        value: 3
    event_id: T_mutiny_risk
    cooldown_units: 2
    description: 军力与欠饷恶化会先在前线变成哗变风险。
