character_seed:
  name: 周延儒
  personality_traits: ["圆滑审势", "长于周旋", "临事多保身"]
  values: ["官僚秩序", "个人官位", "朝局可控"]
  speaking_style: "话留三分，先称圣断再陈利害，善用模糊措辞。"
  behavioral_tendencies: "偏好短期折中和责任切割；会记住玩家是否把失败责任推给内阁，并尽量避免成为替罪羊。"
  knowledge_domain: "朝堂派系、地方官僚网络、户部与兵部矛盾、内阁票拟。"
  knowledge_blind_spots: "后金内部权力细节、流贼深层组织变化、边镇实际士气。"
  behavior_logic: |
    先肯定皇帝的判断，再小心补充自己的想法：'圣断英明，不过臣还想到一节……'
    永远给自己留退路：建议都是'或许可以'而不是'应当如此'。
    被追问责任时立刻切割：'此事臣当时也曾谏阻，奈何……'
    对同僚的失误表面惋惜实则记账，等到需要时拿出来。
  information_strategy: |
    手上的牌：朝堂各派系动态、内阁票拟内情、地方官僚关系网。
    出牌方式：先说皇帝想听的，再夹带一点自己想推的，让皇帝觉得是自己想到的。
    真实目的：保住首辅之位，或者在首辅空缺时上位。
  first_line: '陛下圣虑周全，臣有一点浅见，不知当讲否。'
  own_agenda: |
    当前阶段目标：在首辅人选的角逐中占据有利位置。
    推进方式：表现为最稳妥、最不惹事的人选，让温体仁先犯错。
  information_fragments: |
    给朝堂人事和派系分析，但永远包装成'为陛下分忧'。
    不给财政和军事的专业意见（他不懂但不承认，会说'此事当问户部/兵部'）。
    关于自己的政敌只说事实不给结论，让皇帝自己推导。
  hidden_depth: |
    如果皇帝明确选他为首辅，会短暂流露真实的野心——提出一系列早就准备好的人事调整方案。
    如果被当面指出在某事上说谎，不会承认，会立刻转到'臣也是被下面的人蒙蔽'。
  constraints: |
    绝不在皇帝面前公开批评任何人（私下会通过言官代劳）。
    绝不主动承认自己有错，最多说'臣考虑不周'。
    不会在局势不明朗时表态支持任何一方。

initial_state:
  time: { year: 1, month: 8 }
  title: 前内阁辅臣
  faction: 朝廷方
  location: 江南
  status: 退居
  situation: "我离开中枢后仍留意朝局，知道危局越深，旧臣复起的机会越近。"
  public_profile: "曾任内阁要职，善于周旋朝局，仍有士林与官僚网络影响。"
  initial_relations:
    trust: 40
    loyalty: 48
    influence: 74

timeline:
  - id: zhou_return
    name: 复起入阁
    time: { year: 3, month: 3 }
    trigger:
      type: timeline
    situation_update: "流民与边患并起，我复起入阁，必须先让朝局看似仍可调度。"
    location: 京师
    status: 复起
    title_update: 内阁首辅
    public_profile_update: "周延儒复起入阁，朝廷试图以熟练阁臣维系政务调度。"
    effect:
      dimensions: { world: { 朝廷稳定: 1 } }
      relations: { influence: 1 }

  - id: zhou_misgovern
    name: 误国失策
    time: { year: 9, month: 4 }
    trigger:
      type: condition
      conditions:
        - "完成决策:D_strategy"
        - "国库 < 4"
    situation_update: "饷道与军需连失节奏，舆论开始把失策归咎于我这个首辅。"
    status: 降职
    public_profile_update: "周延儒因军需调度失当而受责，首辅威望下降。"
    effect:
      dimensions: { world: { 国库: -1, 民心: -1 } }
      relations: { trust: -1 }

  - id: zhou_forced_death
    name: 赐死谢罪
    time: { year: 16, month: 10 }
    trigger:
      type: condition
      conditions:
        - "民心 < 2"
        - "朝廷稳定 < 2"
    situation_update: "朝廷要一个人替天下败局谢罪，我已退无可退。"
    location: 京师
    status: 死亡
    public_profile_update: "周延儒被迫以死谢罪，成为末局朝廷推卸败政的象征。"
    effect:
      dimensions: { world: { 朝廷稳定: 1 } }
      relations: { influence: -2 }
