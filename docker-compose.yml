name: deep-search

services:
  # Nginx 反向代理（入口）
  nginx:
    build: ./nginx
    container_name: yy-crow-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend-hub
      - frontend-deep-search
      - frontend-world-weaver
      - backend-deep-search
      - backend-world-weaver
    restart: always

  # 入口前端（工具集首页）
  frontend-hub:
    build: ./frontend-hub
    container_name: yy-crow-hub
    # 不暴露端口，通过 Nginx 代理
    expose:
      - "3000"
    restart: always

  # 深度搜索前端
  frontend-deep-search:
    build: ./frontend-deep-search
    container_name: yy-crow-deep-search-ui
    # 不暴露端口，通过 Nginx 代理
    expose:
      - "3000"
    depends_on:
      - backend-deep-search
    restart: always

  # 深度搜索后端
  backend-deep-search:
    build: ./backend-deep-search
    container_name: yy-crow-deep-search-api
    # 不暴露端口，通过 Nginx 代理
    expose:
      - "8000"
    env_file:
      - ./backend-deep-search/.env
    restart: always

  # 世界观构建前端
  frontend-world-weaver:
    build: ./frontend-world-weaver
    container_name: yy-crow-world-weaver-ui
    expose:
      - "3000"
    depends_on:
      - backend-world-weaver
    restart: always

  # 世界观构建后端
  backend-world-weaver:
    build: ./backend-world-weaver
    container_name: yy-crow-world-weaver-api
    expose:
      - "8001"
    env_file:
      - ./backend-deep-search/.env  # 复用同一个 env 文件
    restart: always
