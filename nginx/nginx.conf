events {
    worker_connections 1024;
}

http {
    # 修改这里：使用容器名 (container_name)
    upstream hub {
        server yy-crow-hub:3000;
    }

    upstream deep_search_ui {
        server yy-crow-deep-search-ui:3000;
    }

    upstream deep_search_api {
        server yy-crow-deep-search-api:8000;
    }

    upstream world_weaver_api {
        server yy-crow-world-weaver-api:8001;
    }

    upstream world_weaver_ui {
        server yy-crow-world-weaver-ui:3000;
    }

    server {
        listen 80;
        listen 443 ssl;
        server_name yy-crow.com;

        # SSL 证书配置
        ssl_certificate /etc/nginx/certs/yy-crow.com.pem;
        ssl_certificate_key /etc/nginx/certs/yy-crow.com.key;
        
        # SSL 优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 工具集首页
        location / {
            proxy_pass http://hub;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 深度搜索工具 - 静态资源（明确匹配 _next 路径）
        location /tools/deep-search/_next/ {
            proxy_pass http://deep_search_ui/tools/deep-search/_next/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 深度搜索工具 - 主页面及其他资源
        location /tools/deep-search {
            proxy_pass http://deep_search_ui/tools/deep-search;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 深度搜索 API
        location /api/deep-search/ {
            proxy_pass http://deep_search_api/;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
        }

        # 世界观构建工具 - 静态资源
        location /tools/world-weaver/_next/ {
            proxy_pass http://world_weaver_ui/tools/world-weaver/_next/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 世界观构建工具 - 主页面
        location /tools/world-weaver {
            proxy_pass http://world_weaver_ui/tools/world-weaver;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 世界观构建 API
        location /api/world-weaver/ {
            proxy_pass http://world_weaver_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

