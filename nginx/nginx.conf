events {
    worker_connections 1024;
}

http {
    upstream hub {
        server frontend-hub:3000;
    }

    upstream deep_search_ui {
        server frontend-deep-search:3000;
    }

    upstream deep_search_api {
        server backend-deep-search:8000;
    }

    server {
        listen 80;
        server_name yy-crow.com;

        # 工具集首页
        location / {
            proxy_pass http://hub;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 深度搜索工具（通过子路径访问）
        location /tools/deep-search {
            proxy_pass http://deep_search_ui;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 深度搜索 API
        location /api/deep-search/ {
            proxy_pass http://deep_search_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

